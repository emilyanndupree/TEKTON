<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKTON | Ultimate Project Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F4F7F9; overflow: hidden; }
        
        /* 1. THE ROADMAP SCROLLER (Larger & Bottom Aligned) */
        .meister-scroller { 
            overflow-x: auto; 
            display: flex; 
            height: calc(100vh - 100px); 
            padding: 3rem; 
            gap: 3rem; 
            scroll-behavior: smooth;
        }
        /* The specific scrollbar from your request */
        .meister-scroller::-webkit-scrollbar { height: 14px; }
        .meister-scroller::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 20px; border: 4px solid #F4F7F9; }
        .meister-scroller::-webkit-scrollbar-track { background: #E2E8F0; border-radius: 20px; }
        
        /* 2. MASSIVE COLUMN HEADERS */
        .kanban-column { min-width: 400px; width: 400px; display: flex; flex-direction: column; }
        .column-header-text { font-size: 2.25rem; font-weight: 900; letter-spacing: -0.05em; line-height: 1; }
        
        /* 3. TASK CARDS & OVERDUE STATES */
        .task-card { background: white; border-radius: 24px; padding: 1.5rem; border: 1px solid #E2E8F0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; }
        .task-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border-color: #6366F1; }
        
        .overdue-card { background-color: #FFF5F5 !important; border: 2px solid #FEB2B2 !important; }
        .overdue-badge { background: #EF4444; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 900; margin-bottom: 12px; display: inline-block; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2); }

        /* 4. EMPTY COLUMN MESSAGES */
        .empty-message { border: 3px dashed #E2E8F0; border-radius: 24px; padding: 4rem 2rem; text-align: center; color: #94A3B8; font-weight: 600; font-size: 1rem; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white border-b px-12 py-6 flex justify-between items-center shrink-0 z-50 shadow-sm">
        <div class="flex items-center gap-6">
            <div class="bg-indigo-600 p-3 rounded-2xl text-white text-2xl shadow-lg shadow-indigo-200">⚒️</div>
            <div>
                <span class="text-[10px] font-black tracking-[0.6em] text-indigo-500 uppercase leading-none">The Artisan's Tool</span>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">TEKTŌN PLAN</h1>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3 bg-slate-50 px-5 py-2.5 rounded-full border border-slate-100">
                <span id="dot" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]"></span>
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">System Live</span>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 text-white px-10 py-4 rounded-full font-black uppercase tracking-widest shadow-xl hover:bg-indigo-700 hover:shadow-indigo-200 transition-all transform active:scale-95">
                + Forge Task
            </button>
        </div>
    </header>

    <main class="meister-scroller" id="boardContainer">
        </main>

    <div id="taskModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[100] flex items-center justify-center p-8">
        <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-7xl max-h-[94vh] overflow-hidden flex flex-col">
            
            <div class="px-10 py-6 border-b flex justify-between items-center bg-white">
                <div class="flex items-center gap-8">
                    <button class="px-6 py-2.5 bg-indigo-50 border-2 border-indigo-600 text-indigo-600 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-100 transition">✓ Complete Task</button>
                    <div class="h-10 w-[1px] bg-slate-100"></div>
                    <nav class="flex gap-8 text-[11px] font-black text-slate-400 uppercase tracking-widest">
                        <span class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Task Details</span>
                        <span class="hover:text-slate-600 cursor-pointer">Checklist</span>
                        <span class="hover:text-slate-600 cursor-pointer">Attachments</span>
                    </nav>
                </div>
                <button onclick="closeModal()" class="text-5xl font-light text-slate-300 hover:text-slate-600 transition">&times;</button>
            </div>

            <div class="flex flex-1 overflow-hidden">
                
                <div class="flex-1 p-16 overflow-y-auto border-r border-slate-50 space-y-12">
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Task Headline</label>
                        <input id="taskTitle" type="text" placeholder="What are we building?" class="w-full text-6xl font-black outline-none placeholder:text-slate-100 tracking-tighter">
                    </div>

                    <div class="space-y-4">
                        <label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Blueprint Description</label>
                        <textarea id="taskDesc" placeholder="Click to add details, materials, or scope..." class="w-full h-64 bg-slate-50/30 p-8 rounded-[32px] outline-none resize-none text-slate-600 text-2xl leading-relaxed border-2 border-transparent focus:border-indigo-50 transition-all"></textarea>
                    </div>

                    <div class="pt-12 border-t border-slate-100">
                        <h3 class="font-black text-slate-900 text-xl mb-8 flex items-center gap-3">Activity <span>⌄</span></h3>
                        <div class="flex gap-6">
                            <div class="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-white shadow-lg">T</div>
                            <div class="flex-1 bg-white border-2 border-slate-100 rounded-3xl p-6 shadow-sm">
                                <textarea placeholder="Write an update to the roadmap..." class="w-full bg-transparent outline-none text-lg h-24"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-[400px] bg-slate-50/50 p-12 space-y-12 overflow-y-auto">
                    
                    <div class="space-y-8">
                        <div>
                            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">📅 Due Date</label>
                            <input id="taskDue" type="date" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none focus:border-indigo-400 transition-all shadow-sm">
                        </div>
                        
                        <div>
                            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">🔄 Relations</label>
                            <select class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-500 outline-none cursor-pointer hover:border-indigo-400 transition">
                                <option>No Relations</option>
                                <option>Blocks: Sub-Project A</option>
                                <option>Blocked By: Initiation Phase</option>
                                <option>Duplicate Of Existing Task</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">👤 Architect</label>
                        <input id="taskCreator" type="text" placeholder="Enter Name" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none">
                    </div>

                    <div class="pt-12 border-t border-slate-200 space-y-6">
                        <div class="flex items-center justify-between">
                            <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Time Tracked</span>
                            <span class="text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Active</span>
                        </div>
                        <div class="bg-indigo-600 rounded-3xl p-8 shadow-2xl shadow-indigo-100 text-white relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 opacity-10 text-8xl">⏱️</div>
                            <h4 id="timeTrack" class="text-4xl font-black tracking-tighter mb-1">00:00:00</h4>
                            <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-60">Total Duration</p>
                        </div>
                        <div class="text-[10px] font-bold text-slate-400 leading-relaxed">
                            <p>Created: <span id="createdOn" class="text-slate-600">--</span></p>
                            <p>Updated: <span class="text-slate-600">Just Now</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-12 py-8 border-t bg-white flex justify-end gap-6 shrink-0">
                <button onclick="closeModal()" class="font-black text-slate-300 uppercase tracking-widest text-sm hover:text-slate-600 transition">Discard</button>
                <button id="submitBtn" onclick="submitTask()" class="bg-indigo-600 text-white px-16 py-5 rounded-full font-black uppercase tracking-widest shadow-2xl hover:bg-indigo-700 transition transform active:scale-95">
                    Forge Task
                </button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwYSnr6ik4C5-hqSYcY_3lD2WW-_0yGeN0zfLWF8xsp4clGZTmig7dTqtxupHg_J4G0vg/exec';
        
        const phases = [
            { id: 'initiation', name: '💡 Initiation', color: '#17d1c1' },
            { id: 'planning', name: '⚙️ Planning', color: '#00a2ed' },
            { id: 'resources', name: '⏳ Resources', color: '#4a69ff' },
            { id: 'execution', name: '🔄 Execution', color: '#a882ff' },
            { id: 'monitoring', name: '👓 Monitoring', color: '#f0506e' },
            { id: 'closing', name: '👍 Closing', color: '#92d000' }
        ];

        function openModal() { document.getElementById('taskModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }

        async function fetchFromGoogle() {
            const container = document.getElementById('boardContainer');
            container.innerHTML = '';
            
            phases.forEach(phase => {
                const col = document.createElement('div');
                col.className = 'kanban-column';
                col.innerHTML = `
                    <div class="flex items-center justify-between mb-10 border-b-[8px] pb-6 px-1" style="border-color: ${phase.color}">
                        <h2 class="column-header-text text-slate-800 uppercase">${phase.name}</h2>
                        <button class="text-slate-300 text-4xl font-light hover:text-slate-500">•••</button>
                    </div>
                    <div id="${phase.id}" class="space-y-8 flex-1 overflow-y-auto no-scrollbar pb-10">
                        <div class="empty-message">No tasks forged in ${phase.name.split(' ')[1]} phase.</div>
                    </div>
                `;
                container.appendChild(col);
            });

            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                const now = new Date();

                data.forEach(task => {
                    const status = (task.status || 'initiation').toLowerCase().trim();
                    const column = document.getElementById(status);
                    if (!column) return;
                    
                    const empty = column.querySelector('.empty-message');
                    if(empty) empty.remove();

                    const card = document.createElement('div');
                    let overdueHtml = '';
                    let cardClasses = 'task-card';
                    
                    // Overdue Logic (Image 6)
                    if (task.due_date && status !== 'closing') {
                        const due = new Date(task.due_date);
                        if (due < now) {
                            cardClasses += ' overdue-card';
                            overdueHtml = '<span class="overdue-badge">⚠️ OVERDUE</span>';
                        }
                    }

                    // Completed Logic (Image 7)
                    if (status === 'closing') {
                        cardClasses += ' opacity-80 grayscale-[0.5]';
                    }

                    card.className = cardClasses;
                    card.innerHTML = `
                        ${overdueHtml}
                        <h3 class="font-black text-slate-900 text-2xl leading-tight mb-3 tracking-tight">${task.title}</h3>
                        <p class="text-base text-slate-400 font-medium line-clamp-3 mb-8 leading-relaxed">${task.description || 'No blueprint details yet.'}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-xs font-black text-indigo-400 border border-indigo-100 shadow-sm">
                                    ${(task.creator || 'T').charAt(0).toUpperCase()}
                                </div>
                                <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">${task.creator || 'Tektōn'}</span>
                            </div>
                            <span class="text-[11px] font-black text-slate-300 uppercase">${task.due_date ? '📅 ' + task.due_date : ''}</span>
                        </div>
                    `;
                    column.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        async function submitTask() {
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const creator = document.getElementById('taskCreator').value;
            const due = document.getElementById('taskDue').value;
            const btn = document.getElementById('submitBtn');

            if(!title) return alert("Architecture requires a title!");
            btn.innerText = "FORGING...";
            btn.disabled = true;

            try {
                await fetch(`${scriptURL}?title=${encodeURIComponent(title)}&description=${encodeURIComponent(desc)}&creator=${encodeURIComponent(creator)}&due_date=${due}&status=initiation`, {
                    method: 'POST',
                    mode: 'no-cors'
                });
                closeModal();
                fetchFromGoogle();
            } catch (e) { console.error(e); }
            finally {
                btn.innerText = "FORGE TASK";
                btn.disabled = false;
            }
        }

        window.onload = fetchFromGoogle;
    </script>
</body>
</html>
