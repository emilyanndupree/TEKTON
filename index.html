<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Project Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-indigo-600">ProjectBoard</h1>
            <div id="syncStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <span id="dot" class="w-2 h-2 rounded-full bg-green-500"></span> Synced
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="fetchFromGoogle()" class="px-4 py-2 text-sm bg-slate-100 rounded-lg hover:bg-slate-200 transition">🔄 Refresh</button>
            <button onclick="openModal()" class="px-5 py-2 text-sm font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-md transition">Add Task</button>
        </div>
    </header>

    <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-[1400px] mx-auto">
        <section>
            <h2 class="font-bold text-slate-500 mb-4 px-2 uppercase text-xs tracking-widest">To Do</h2>
            <div id="todo" class="min-h-[600px] p-2 bg-slate-200/50 rounded-2xl space-y-3"></div>
        </section>

        <section>
            <h2 class="font-bold text-slate-500 mb-4 px-2 uppercase text-xs tracking-widest">In Progress</h2>
            <div id="inprogress" class="min-h-[600px] p-2 bg-slate-200/50 rounded-2xl space-y-3"></div>
        </section>

        <section>
            <h2 class="font-bold text-slate-500 mb-4 px-2 uppercase text-xs tracking-widest">Done</h2>
            <div id="done" class="min-h-[600px] p-2 bg-slate-200/50 rounded-2xl space-y-3"></div>
        </section>
    </main>

    <script>
        // THE GOOGLE DRIVE LINK YOU PROVIDED
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxNSzlj4F8IPzuYc17vT94Hj_8qkgDaimQXv4fPl2oeCXe2Q6XJg3G-zyODQz2C2Wjq6w/exec';

        async function fetchFromGoogle() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                // Clear the columns
                document.getElementById('todo').innerHTML = '';
                document.getElementById('inprogress').innerHTML = '';
                document.getElementById('done').innerHTML = '';

                data.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-4 rounded-xl shadow-sm border border-slate-200';
                    card.innerHTML = `<h3 class="font-bold text-slate-800">${task.title}</h3><p class="text-sm text-slate-500">${task.description || ''}</p>`;
                    
                    // Put task in the right column based on status
                    const colId = (task.status || 'todo').toLowerCase().replace(/\s+/g, '');
                    const target = document.getElementById(colId) || document.getElementById('todo');
                    target.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function openModal() {
            console.log("Add Task clicked");
        }

        // Run on load
        window.onload = fetchFromGoogle;
    </script>
</body>
</html>
