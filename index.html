<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Project Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-indigo-600">ProjectBoard</h1>
            <div id="syncStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <span id="dot" class="w-2 h-2 rounded-full bg-green-500"></span> Synced
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="fetchFromGoogle()" class="px-4 py-2 text-sm bg-slate-100 rounded-lg hover:bg-slate-200 transition">🔄 Refresh</button>
            <button onclick="openModal()" class="px-5 py-2 text-sm font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-md">+ Add Task</button>
        </div>
    </header>

    <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-[1400px] mx-auto">
        <section>
            <h2 class="font-bold text-slate-500 mb-4 px-2 uppercase text-xs tracking-widest">To Do</h2>
            <div id="todo" class="min-h-[600px] p-2 bg-slate-200/50 rounded-2xl space-y-3"></div>
        </section>
        <section>
            <h2 class="font-bold text-blue-600 mb-4 px-2 uppercase text-xs tracking-widest">In Progress</h2>
            <div id="doing" class="min-h-[600px] p-2 bg-blue-50 rounded-2xl border border-blue-100 space-y-3"></div>
        </section>
        <section>
            <h2 class="font-bold text-emerald-600 mb-4 px-2 uppercase text-xs tracking-widest">Done</h2>
            <div id="done" class="min-h-[600px] p-2 bg-emerald-50 rounded-2xl border border-emerald-100 space-y-3"></div>
        </section>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">New Task</h2>
            <input id="tTitle" type="text" placeholder="Task Name" class="w-full border-2 border-slate-100 p-3 rounded-xl mb-4 outline-none focus:border-indigo-500">
            <textarea id="tDesc" placeholder="Description or Drive Link..." class="w-full border-2 border-slate-100 p-3 rounded-xl mb-4 h-28 outline-none focus:border-indigo-500"></textarea>
            
            <div class="flex justify-between items-center mb-6">
                <span class="text-sm font-bold text-slate-500 uppercase">Assignee</span>
                <select id="tUser" class="border-2 border-slate-100 p-2 rounded-lg outline-none">
                    <option>User 1</option>
                    <option>User 2</option>
                </select>
            </div>

            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 font-medium">Cancel</button>
                <button onclick="saveTask()" class="px-8 py-2 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700">Create</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4CRuAYyY9svfXNO3Ry-HC9zJE9tViAGbnK8g5VGuZfU-_SgEFWcrtlhQjx-0s1pzf/exec";
        let tasks = [];

        // Drag & Drop
        ['todo', 'doing', 'done'].forEach(id => {
            new Sortable(document.getElementById(id), {
                group: 'kanban',
                animation: 150,
                ghostClass: 'opacity-20',
                onEnd: (evt) => {
                    const task = tasks.find(t => t.id == evt.item.dataset.id);
                    if(task) {
                        task.status = evt.to.id;
                        if(task.status === 'doing' && !task.start) task.start = Date.now();
                        if(task.status === 'done' && !task.end) task.end = Date.now();
                        syncToGoogle();
                        renderBoard();
                    }
                }
            });
        });

        async function fetchFromGoogle() {
            updateStatus('syncing');
            try {
                const r = await fetch(SCRIPT_URL);
                tasks = await r.json();
                renderBoard();
                updateStatus('ready');
            } catch(e) { updateStatus('error'); }
        }

        async function syncToGoogle() {
            updateStatus('syncing');
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(tasks)
            });
            setTimeout(() => updateStatus('ready'), 1500);
        }

        function saveTask() {
            const title = document.getElementById('tTitle').value;
            if(!title) return;
            const newTask = {
                id: Date.now(),
                title,
                desc: document.getElementById('tDesc').value,
                user: document.getElementById('tUser').value,
                status: 'todo',
                start: null,
                end: null
            };
            tasks.push(newTask);
            closeModal();
            renderBoard();
            syncToGoogle();
        }

        function renderBoard() {
            ['todo', 'doing', 'done'].forEach(col => {
                const el = document.getElementById(col);
                el.innerHTML = '';
                tasks.filter(t => t.status === col).forEach(t => {
                    let time = "";
                    if(t.start && t.end) {
                        const mins = Math.floor((t.end - t.start) / 60000);
                        time = mins > 60 ? (mins/60).toFixed(1) + "h" : mins + "m";
                    }

                    // Check for links in description
                    const hasLink = t.desc.includes('http');
                    const linkMatch = t.desc.match(/\bhttps?:\/\/\S+/gi);

                    el.innerHTML += `
                        <div data-id="${t.id}" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all group">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">${t.user}</span>
                                ${time ? `<span class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded-full font-bold">⏱ ${time}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-slate-800 leading-tight">${t.title}</h3>
                            <p class="text-xs text-slate-400 mt-2 line-clamp-2">${t.desc}</p>
                            ${hasLink ? `<a href="${linkMatch[0]}" target="_blank" class="mt-3 block text-center text-[10px] font-bold bg-slate-50 text-indigo-600 py-2 rounded-lg border border-indigo-100 hover:bg-indigo-50">📎 VIEW ATTACHMENT</a>` : ''}
                        </div>
                    `;
                });
            });
        }

        function updateStatus(state) {
            const dot = document.getElementById('dot');
            const txt = document.getElementById('syncStatus');
            if(state === 'syncing') { dot.className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse"; }
            else if(state === 'error') { dot.className = "w-2 h-2 rounded-full bg-red-500"; }
            else { dot.className = "w-2 h-2 rounded-full bg-green-500"; }
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('tTitle').value = '';
            document.getElementById('tDesc').value = '';
        }

        fetchFromGoogle();
        setInterval(fetchFromGoogle, 30000); // Auto-refresh every 30s
    </script>
</body>
</html>
