<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEKTON | Project Masterwork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Figtree', sans-serif;
      background-color: #F4F7F9;
      overflow: hidden;
      height: 100vh;
    }

    .board-wrapper {
      display: flex;
      height: calc(100vh - 85px);
      padding: 1.5rem;
      gap: 1.25rem;
      overflow-x: auto;
      align-items: flex-start;
    }

    .kanban-column {
      min-width: 320px;
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      max-height: 100%;
      position: relative;
    }

    .col-header {
      font-size: 1.15rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 5px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: -0.02em;
    }

    .task-column {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 1rem;
      border-radius: 20px;
      transition: background 0.2s ease;
    }

    .task-column.drag-over {
      background: rgba(99, 102, 241, 0.06);
    }

    .task-card {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      border: 1px solid #E2E8F0;
      margin-bottom: 0.9rem;
      transition: all 0.25s ease;
      cursor: grab;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .task-card:hover {
      border-color: #6366F1;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    .task-card.dragging {
      opacity: 0.45;
      transform: rotate(1deg);
    }

    .column-menu {
      position: absolute;
      right: 0;
      top: 45px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.08);
      border: 1px solid #E2E8F0;
      width: 190px;
      z-index: 100;
      display: none;
      padding: 6px;
    }

    .column-menu button {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #475569;
      border-radius: 8px;
      transition: 0.2s;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .column-menu button:hover {
      background: #F1F5F9;
      color: #6366F1;
    }

    .overdue-card {
      background-color: #FFF5F5 !important;
      border: 2px solid #FEB2B2 !important;
    }

    .overdue-badge {
      background: #EF4444;
      color: white;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      margin-bottom: 8px;
      display: inline-block;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748B;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 999px;
      padding: 6px 9px;
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #EEF2FF;
      border: 1px solid #C7D2FE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      color: #6366F1;
    }

    .placeholder {
      border: 2px dashed #CBD5E1;
      border-radius: 22px;
      padding: 2rem 1rem;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      background: rgba(255,255,255,0.45);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="flex flex-col">

  <header class="bg-white border-b px-8 py-5 flex justify-between items-center shrink-0 h-[85px] z-50">
    <div class="flex items-center gap-5">
      <div class="bg-indigo-600 p-2.5 rounded-xl text-white font-black italic shadow-lg shadow-indigo-200">T</div>
      <div>
        <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">TEKTON</h1>
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.4em] mt-1">Project Roadmap</p>
      </div>
    </div>

    <div class="flex items-center gap-6">
      <div id="syncStatus" class="flex items-center gap-3 bg-slate-50 px-5 py-2.5 rounded-full border border-slate-100">
        <span id="dot" class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.5)]"></span>
        <span id="syncText" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live Sync</span>
      </div>
      <button onclick="openCreateModal()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest hover:bg-indigo-700 shadow-xl shadow-indigo-100 active:scale-95 transition-all">+ Add Task</button>
    </div>
  </header>

  <main class="board-wrapper no-scrollbar" id="boardContainer"></main>

  <div id="taskModal" class="hidden fixed inset-0 bg-slate-900/80 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
    <div class="bg-white rounded-[32px] w-full max-w-5xl max-h-[92vh] overflow-hidden flex flex-col border border-white/20 shadow-2xl">
      <div class="px-10 py-6 border-b flex justify-between items-center bg-white">
        <div class="flex items-center gap-4">
          <span id="modalModeLabel" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">New Task</span>
        </div>
        <button onclick="closeModal()" class="text-5xl text-slate-200 hover:text-slate-600 transition">&times;</button>
      </div>

      <div class="flex flex-1 overflow-hidden">
        <div class="flex-1 p-12 overflow-y-auto border-r border-slate-50 space-y-10">
          <input type="hidden" id="taskId">

          <div class="space-y-2">
            <label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Headline</label>
            <input id="taskTitle" type="text" placeholder="Entry Title..." class="w-full text-5xl font-black outline-none border-b-4 border-transparent focus:border-indigo-100 tracking-tighter placeholder:text-slate-100">
          </div>

          <div class="space-y-4">
            <label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Description</label>
            <textarea id="taskDesc" placeholder="Describe the build process..." class="w-full h-64 bg-slate-50/50 p-8 rounded-[32px] outline-none resize-none text-slate-600 text-xl leading-relaxed border-2 border-transparent focus:border-slate-100 transition-all"></textarea>
          </div>
        </div>

        <div class="w-96 bg-slate-50/50 p-12 space-y-8">
          <div>
            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">Status</label>
            <select id="taskStatus" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none shadow-sm focus:border-indigo-400 transition-all">
              <option value="initiation">Initiation</option>
              <option value="planning">Planning</option>
              <option value="resources">Resources</option>
              <option value="execution">Execution</option>
              <option value="monitoring">Monitoring</option>
              <option value="closing">Closing</option>
            </select>
          </div>

          <div>
            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">Creator</label>
            <input id="taskCreator" type="text" placeholder="First Name Last Name" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none shadow-sm focus:border-indigo-400 transition-all">
          </div>

          <div>
            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">Due Date</label>
            <input id="taskDue" type="date" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none shadow-sm focus:border-indigo-400 transition-all">
          </div>

          <div id="trackerBox" class="bg-indigo-600 rounded-[40px] p-10 text-white shadow-2xl shadow-indigo-100 transition-all duration-700 relative overflow-hidden">
            <div class="absolute -right-4 -top-4 opacity-10 text-8xl">⏱️</div>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-60 mb-2">Task State</p>
            <h4 id="timeTrack" class="text-3xl font-black italic tracking-tighter">Active</h4>
          </div>
        </div>
      </div>

      <div class="px-12 py-8 border-t bg-white flex justify-between items-center shrink-0">
        <button id="deleteBtn" onclick="deleteTask()" class="hidden font-black text-red-500 text-xs uppercase tracking-widest hover:text-red-700 transition">Delete Task</button>
        <div class="flex gap-6 ml-auto">
          <button onclick="closeModal()" class="font-black text-slate-300 text-xs uppercase tracking-widest hover:text-slate-600 transition">Discard</button>
          <button id="submitBtn" onclick="saveTask()" class="bg-indigo-600 text-white px-16 py-5 rounded-full font-black uppercase tracking-widest shadow-2xl shadow-indigo-200 hover:bg-indigo-700 transition active:scale-95">Save Task</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwY5ZaJnj85-b_SX70IpfQ6n457xgNid0v7mop4BAA-pBzb6bEfHtw3lIeNO6OeiRt8/exec";

    const phases = [
      { id: "initiation", name: "Initiation", color: "#17d1c1" },
      { id: "planning", name: "Planning", color: "#00a2ed" },
      { id: "resources", name: "Resources", color: "#4a69ff" },
      { id: "execution", name: "Execution", color: "#a882ff" },
      { id: "monitoring", name: "Monitoring", color: "#f0506e" },
      { id: "closing", name: "Closing", color: "#92d000" }
    ];

    let currentTasks = [];
    let draggedTaskId = null;

    function setSyncStatus(text, dotClass) {
      document.getElementById("syncText").innerText = text;
      document.getElementById("dot").className = "w-2.5 h-2.5 rounded-full " + dotClass;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function openCreateModal() {
      document.getElementById("modalModeLabel").innerText = "New Task";
      document.getElementById("taskId").value = "";
      document.getElementById("taskTitle").value = "";
      document.getElementById("taskDesc").value = "";
      document.getElementById("taskStatus").value = "initiation";
      document.getElementById("taskCreator").value = "";
      document.getElementById("taskDue").value = "";
      document.getElementById("deleteBtn").classList.add("hidden");
      document.getElementById("timeTrack").innerText = "Active";
      document.getElementById("trackerBox").classList.remove("bg-emerald-600");
      document.getElementById("trackerBox").classList.add("bg-indigo-600");
      document.getElementById("taskModal").classList.remove("hidden");
    }

    function openEditModal(taskId) {
      const task = currentTasks.find(t => String(t.task_id) === String(taskId));
      if (!task) return;

      document.getElementById("modalModeLabel").innerText = "Edit Task";
      document.getElementById("taskId").value = task.task_id || "";
      document.getElementById("taskTitle").value = task.title || "";
      document.getElementById("taskDesc").value = task.description || "";
      document.getElementById("taskStatus").value = (task.status || "initiation").toLowerCase().trim();
      document.getElementById("taskCreator").value = task.creator || "";
      document.getElementById("taskDue").value = task.due_date || "";
      document.getElementById("deleteBtn").classList.remove("hidden");

      if ((task.status || "").toLowerCase().trim() === "closing") {
        document.getElementById("timeTrack").innerText = "Complete";
        document.getElementById("trackerBox").classList.remove("bg-indigo-600");
        document.getElementById("trackerBox").classList.add("bg-emerald-600");
      } else {
        document.getElementById("timeTrack").innerText = "Active";
        document.getElementById("trackerBox").classList.remove("bg-emerald-600");
        document.getElementById("trackerBox").classList.add("bg-indigo-600");
      }

      document.getElementById("taskModal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("taskModal").classList.add("hidden");
    }

    function toggleColumnMenu(phaseId) {
      const menu = document.getElementById("menu-" + phaseId);
      const isVisible = menu.style.display === "block";
      document.querySelectorAll(".column-menu").forEach(m => m.style.display = "none");
      menu.style.display = isVisible ? "none" : "block";
    }

    function renderBoardShell() {
      const container = document.getElementById("boardContainer");
      container.innerHTML = "";

      phases.forEach(p => {
        container.innerHTML += `
          <div class="kanban-column">
            <div class="col-header" style="border-color: ${p.color}; color: #1e293b;">
              <span>${p.name}</span>
              <button id="dots-${p.id}" onclick="toggleColumnMenu('${p.id}')" class="text-slate-300 font-bold hover:text-slate-600 transition text-2xl">•••</button>
              <div id="menu-${p.id}" class="column-menu">
                <button onclick="sortColumnByDueDate('${p.id}')">Sort by Due Date</button>
                <button onclick="refreshBoard()">Refresh Column</button>
              </div>
            </div>
            <div id="${p.id}" class="task-column no-scrollbar space-y-4"
                 ondragover="allowDrop(event)"
                 ondragleave="handleDragLeave(event)"
                 ondrop="dropTask(event, '${p.id}')">
              <div class="placeholder">Phase Empty</div>
            </div>
          </div>
        `;
      });
    }

    function renderTasks(tasks) {
      const now = new Date();

      tasks.forEach(task => {
        const status = (task.status || "initiation").toLowerCase().trim();
        const column = document.getElementById(status);
        if (!column) return;

        const placeholder = column.querySelector(".placeholder");
        if (placeholder) placeholder.remove();

        const dueDate = task.due_date ? new Date(task.due_date) : null;
        const isOverdue = dueDate && !isNaN(dueDate.getTime()) && status !== "closing" && dueDate < now;

        const card = document.createElement("div");
        card.className = "task-card" + (isOverdue ? " overdue-card" : "");
        card.draggable = true;
        card.dataset.taskId = task.task_id || "";
        card.ondragstart = function(e) { dragTask(e, task.task_id); };
        card.ondragend = function() { endDrag(); };
        card.onclick = function(e) {
          if (!e.target.closest(".card-handle")) {
            openEditModal(task.task_id);
          }
        };

        const creator = task.creator || "";
        const creatorInitial = creator ? creator.charAt(0).toUpperCase() : "?";

        card.innerHTML = `
          ${isOverdue ? '<span class="overdue-badge">OVERDUE</span>' : ''}
          <div class="flex items-start justify-between gap-3">
            <h3 class="font-black text-slate-800 uppercase tracking-tight leading-tight text-base">${escapeHtml(task.title || "")}</h3>
            <span class="card-handle text-slate-300 text-lg select-none">⋮⋮</span>
          </div>
          <p class="text-sm text-slate-500 font-medium leading-relaxed mt-2 whitespace-pre-line">${escapeHtml(task.description || "")}</p>
          <div class="flex flex-wrap gap-2 mt-4">
            ${task.due_date ? `<span class="meta-pill">Due ${escapeHtml(task.due_date)}</span>` : ""}
            <span class="meta-pill">${escapeHtml(status)}</span>
          </div>
          <div class="flex justify-between items-center mt-5 pt-4 border-t border-slate-100">
            <div class="flex items-center gap-2">
              <div class="avatar">${escapeHtml(creatorInitial)}</div>
              <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${escapeHtml(creator)}</span>
            </div>
          </div>
        `;

        column.appendChild(card);
      });
    }

    async function fetchFromGoogle() {
      setSyncStatus("Syncing", "bg-yellow-500 animate-pulse");
      renderBoardShell();

      try {
        const response = await fetch(scriptURL);
        if (!response.ok) throw new Error("HTTP " + response.status);

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        currentTasks = Array.isArray(data) ? data : [];
        renderTasks(currentTasks);
        setSyncStatus("Live Sync", "bg-green-500 animate-pulse");
      } catch (error) {
        console.error("Load error:", error);
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not load tasks. Check the Apps Script deployment and your sheet headers.");
      }
    }

    async function saveTask() {
      const taskId = document.getElementById("taskId").value.trim();
      const title = document.getElementById("taskTitle").value.trim();
      const description = document.getElementById("taskDesc").value.trim();
      const status = document.getElementById("taskStatus").value;
      const creator = document.getElementById("taskCreator").value.trim();
      const dueDate = document.getElementById("taskDue").value;
      const btn = document.getElementById("submitBtn");

      if (!title) {
        alert("Title required.");
        return;
      }

      if (!creator) {
        alert("Creator name required.");
        return;
      }

      btn.disabled = true;
      btn.innerText = "Saving...";
      setSyncStatus("Saving", "bg-yellow-500 animate-pulse");

      try {
        const formData = new URLSearchParams();

        if (taskId) {
          formData.append("action", "update");
          formData.append("task_id", taskId);
        } else {
          formData.append("action", "create");
        }

        formData.append("title", title);
        formData.append("description", description);
        formData.append("status", status);
        formData.append("creator", creator);
        formData.append("due_date", dueDate);

        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Save failed");

        closeModal();
        await fetchFromGoogle();
      } catch (error) {
        console.error("Save error:", error);
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not save task.");
      } finally {
        btn.disabled = false;
        btn.innerText = "Save Task";
      }
    }

    async function deleteTask() {
      const taskId = document.getElementById("taskId").value.trim();
      if (!taskId) return;

      const confirmed = window.confirm("Delete this task?");
      if (!confirmed) return;

      setSyncStatus("Deleting", "bg-yellow-500 animate-pulse");

      try {
        const formData = new URLSearchParams();
        formData.append("action", "delete");
        formData.append("task_id", taskId);

        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Delete failed");

        closeModal();
        await fetchFromGoogle();
      } catch (error) {
        console.error("Delete error:", error);
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not delete task.");
      }
    }

    function dragTask(event, taskId) {
      draggedTaskId = taskId;
      event.dataTransfer.setData("text/plain", taskId);
      event.currentTarget.classList.add("dragging");
    }

    function endDrag() {
      document.querySelectorAll(".task-card").forEach(card => card.classList.remove("dragging"));
      document.querySelectorAll(".task-column").forEach(col => col.classList.remove("drag-over"));
    }

    function allowDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(event) {
      if (event.currentTarget.contains(event.relatedTarget)) return;
      event.currentTarget.classList.remove("drag-over");
    }

    async function dropTask(event, newStatus) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");

      const taskId = event.dataTransfer.getData("text/plain") || draggedTaskId;
      if (!taskId) return;

      const task = currentTasks.find(t => String(t.task_id) === String(taskId));
      if (task && (task.status || "").toLowerCase().trim() === newStatus) {
        endDrag();
        return;
      }

      setSyncStatus("Moving", "bg-yellow-500 animate-pulse");

      try {
        const formData = new URLSearchParams();
        formData.append("action", "move");
        formData.append("task_id", taskId);
        formData.append("status", newStatus);

        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Move failed");

        await fetchFromGoogle();
      } catch (error) {
        console.error("Move error:", error);
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not move task.");
      } finally {
        endDrag();
      }
    }

    function sortColumnByDueDate(columnId) {
      const sorted = [...currentTasks].sort((a, b) => {
        const aMatch = (a.status || "").toLowerCase().trim() === columnId;
        const bMatch = (b.status || "").toLowerCase().trim() === columnId;
        if (!aMatch && !bMatch) return 0;
        if (aMatch && !bMatch) return -1;
        if (!aMatch && bMatch) return 1;

        const aDate = a.due_date ? new Date(a.due_date).getTime() : Number.MAX_SAFE_INTEGER;
        const bDate = b.due_date ? new Date(b.due_date).getTime() : Number.MAX_SAFE_INTEGER;
        return aDate - bDate;
      });

      renderBoardShell();
      renderTasks(sorted);
    }

    function refreshBoard() {
      fetchFromGoogle();
    }

    window.onclick = function(event) {
      const modal = document.getElementById("taskModal");
      if (event.target === modal) closeModal();

      if (!event.target.closest(".kanban-column")) {
        document.querySelectorAll(".column-menu").forEach(menu => {
          menu.style.display = "none";
        });
      }
    };

    window.onload = fetchFromGoogle;
  </script>
</body>
</html>
