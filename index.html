<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEKTON | Project Masterwork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Figtree', sans-serif;
      background-color: #F4F7F9;
      overflow: auto;
      min-height: 100vh;
    }

    .board-wrapper {
      display: flex;
      min-height: calc(100vh - 85px);
      padding: 1.5rem;
      gap: 1.25rem;
      overflow: visible;
      align-items: flex-start;
      min-width: max-content;
    }

    .kanban-column {
      min-width: 320px;
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .col-header {
      font-size: 1.15rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 5px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: -0.02em;
      position: sticky;
      top: 85px;
      background: #F4F7F9;
      z-index: 30;
    }

    .task-column {
      padding-bottom: 1rem;
      border-radius: 20px;
      transition: background 0.2s ease;
      min-height: 180px;
    }

    .task-column.drag-over {
      background: rgba(99, 102, 241, 0.06);
    }

    .task-card {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      border: 1px solid #E2E8F0;
      margin-bottom: 0.9rem;
      transition: all 0.25s ease;
      cursor: grab;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .task-card:hover {
      border-color: #6366F1;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    .task-card.dragging {
      opacity: 0.45;
      transform: rotate(1deg);
    }

    .task-card.completed-card h3,
    .task-card.completed-card p,
    .task-card.completed-card .desc-line {
      text-decoration: line-through;
      opacity: 0.8;
    }

    .task-card.collapsed-card .collapsible-detail {
      display: none;
    }

    .collapse-toggle {
      border: 0;
      background: #F1F5F9;
      color: #64748B;
      border-radius: 999px;
      width: 28px;
      height: 28px;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
    }

    .column-menu {
      position: absolute;
      right: 0;
      top: 45px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.08);
      border: 1px solid #E2E8F0;
      width: 210px;
      z-index: 100;
      display: none;
      padding: 6px;
    }

    .column-menu button {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #475569;
      border-radius: 8px;
      transition: 0.2s;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .column-menu button:hover {
      background: #F1F5F9;
      color: #6366F1;
    }

    .overdue-card {
      background-color: #FFF5F5 !important;
      border: 2px solid #FEB2B2 !important;
    }

    .overdue-badge {
      background: #EF4444;
      color: white;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      margin-bottom: 8px;
      display: inline-block;
    }

    .upcoming-badge {
      background: #F59E0B;
      color: white;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      margin-bottom: 8px;
      display: inline-block;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748B;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 999px;
      padding: 6px 9px;
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #EEF2FF;
      border: 1px solid #C7D2FE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      color: #6366F1;
    }

    .placeholder {
      border: 2px dashed #CBD5E1;
      border-radius: 22px;
      padding: 2rem 1rem;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      background: rgba(255,255,255,0.45);
    }

    .strike-title {
      text-decoration: line-through;
      opacity: 0.7;
    }

    .sheet-checkbox {
      appearance: none !important;
      -webkit-appearance: none !important;
      width: 16px !important;
      height: 16px !important;
      min-width: 16px !important;
      min-height: 16px !important;
      border: 2px solid #94A3B8 !important;
      border-radius: 2px !important;
      background: #FFFFFF !important;
      cursor: pointer;
      margin-top: 2px;
      flex-shrink: 0;
      position: relative;
      display: inline-block;
      vertical-align: middle;
    }

    .sheet-checkbox:hover {
      border-color: #2563EB !important;
    }

    .sheet-checkbox:checked {
      background: #2563EB !important;
      border-color: #2563EB !important;
    }

    .sheet-checkbox:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
  </style>
</head>

<body class="flex flex-col">
  <header class="bg-white border-b px-8 py-5 flex justify-between items-center shrink-0 h-[85px] z-50 sticky top-0">
    <div class="flex items-center gap-5">
      <img src="https://i.ibb.co/VpT09FQ0/Chat-GPT-Image-May-1-2026-12-51-11-PM-1.png" alt="TEKTON" class="w-12 h-12 rounded-xl object-cover shadow-lg">
      <div>
        <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">TEKTON</h1>
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.4em] mt-1">Project Roadmap</p>
      </div>
    </div>

    <div class="flex items-center gap-6">
      <div id="syncStatus" class="flex items-center gap-3 bg-slate-50 px-5 py-2.5 rounded-full border border-slate-100">
        <span id="dot" class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.5)]"></span>
        <span id="syncText" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live Sync</span>
      </div>
      <button onclick="openCreateModal()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest hover:bg-indigo-700 shadow-xl shadow-indigo-100 active:scale-95 transition-all">+ Add Task</button>
    </div>
  </header>

  <main class="board-wrapper" id="boardContainer"></main>

  <div id="taskModal" class="hidden fixed inset-0 bg-slate-900/80 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
    <div class="bg-white rounded-[32px] w-full max-w-5xl max-h-[92vh] overflow-hidden flex flex-col border border-white/20 shadow-2xl">
      <div class="px-10 py-6 border-b flex justify-between items-center bg-white">
        <span id="modalModeLabel" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">New Task</span>
        <button onclick="closeModal()" class="text-5xl text-slate-200 hover:text-slate-600 transition">&times;</button>
      </div>

      <div class="flex flex-1 overflow-hidden">
        <div class="flex-1 p-12 overflow-y-auto border-r border-slate-50 space-y-10">
          <input type="hidden" id="taskId">

          <div class="space-y-2">
            <label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Headline</label>
            <input id="taskTitle" type="text" placeholder="Entry Title..." class="w-full text-5xl font-black outline-none border-b-4 border-transparent focus:border-indigo-100 tracking-tighter placeholder:text-slate-100">
          </div>

          <div class="space-y-4">
            <div class="flex items-center justify-between gap-4">
              <label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Description</label>
              <button onclick="convertDescriptionToChecklist()" class="px-4 py-2 rounded-full bg-slate-800 text-white font-black text-[10px] uppercase tracking-widest">Add Checkboxes</button>
            </div>
            <textarea id="taskDesc" placeholder="Describe the build process..." class="w-full h-64 bg-slate-50/50 p-8 rounded-[32px] outline-none resize-none text-slate-600 text-xl leading-relaxed border-2 border-transparent focus:border-slate-100 transition-all"></textarea>
          </div>
        </div>

        <div class="w-96 bg-slate-50/50 p-12 space-y-8">
          <div>
            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">Status</label>
            <select id="taskStatus" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none shadow-sm focus:border-indigo-400 transition-all">
              <option value="initiation">Initiation</option>
              <option value="planning">Planning</option>
              <option value="resources">Resources</option>
              <option value="execution">Execution</option>
              <option value="monitoring">Monitoring</option>
              <option value="completed">Completed</option>
              <option value="archived">Archived</option>
            </select>
          </div>

          <div>
            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">Creator</label>
            <input id="taskCreator" type="text" placeholder="First Name Last Name" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none shadow-sm focus:border-indigo-400 transition-all">
          </div>

          <div>
            <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-4">Due Date</label>
            <input id="taskDue" type="date" class="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none shadow-sm focus:border-indigo-400 transition-all">
          </div>

          <div id="trackerBox" class="bg-indigo-600 rounded-[40px] p-10 text-white shadow-2xl shadow-indigo-100 transition-all duration-700 relative overflow-hidden">
            <div class="absolute -right-4 -top-4 opacity-10 text-8xl">⏱️</div>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-60 mb-2">Task State</p>
            <h4 id="timeTrack" class="text-3xl font-black italic tracking-tighter">Active</h4>
            <p id="completionDurationLabel" class="text-xs font-black opacity-80 mt-3 uppercase tracking-widest"></p>
          </div>
        </div>
      </div>

      <div class="px-12 py-8 border-t bg-white flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
          <button id="completeBtn" onclick="toggleCompleted()" class="px-5 py-3 rounded-full bg-emerald-600 text-white font-black text-xs uppercase tracking-widest">Completed</button>
          <span id="completedTitleLabel" class="text-sm font-black text-slate-500"></span>
          <button id="archiveBtn" onclick="archiveTask()" class="px-5 py-3 rounded-full bg-slate-800 text-white font-black text-xs uppercase tracking-widest">Archive</button>
        </div>

        <div class="flex gap-6 ml-auto">
          <button onclick="closeModal()" class="font-black text-slate-300 text-xs uppercase tracking-widest hover:text-slate-600 transition">Discard</button>
          <button id="submitBtn" onclick="saveTask()" class="bg-indigo-600 text-white px-16 py-5 rounded-full font-black uppercase tracking-widest shadow-2xl shadow-indigo-200 hover:bg-indigo-700 transition active:scale-95">Save Task</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwY5ZaJnj85-b_SX70IpfQ6n457xgNid0v7mop4BAA-pBzb6bEfHtw3lIeNO6OeiRt8/exec";

    const phases = [
      { id: "initiation", name: "Initiation", color: "#17d1c1" },
      { id: "planning", name: "Planning", color: "#00a2ed" },
      { id: "resources", name: "Resources", color: "#4a69ff" },
      { id: "execution", name: "Execution", color: "#a882ff" },
      { id: "monitoring", name: "Monitoring", color: "#f0506e" },
      { id: "completed", name: "Completed", color: "#84cc16" },
      { id: "archived", name: "Archived", color: "#1e293b" }
    ];

    let currentTasks = [];
    let draggedTaskId = null;
    let isMovingTask = false;
    let collapsedCards = JSON.parse(localStorage.getItem("tektonCollapsedCards") || "{}");

    function setSyncStatus(text, dotClass) {
      document.getElementById("syncText").innerText = text;
      document.getElementById("dot").className = "w-2.5 h-2.5 rounded-full " + dotClass;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function isTruthy(value) {
      return String(value).toLowerCase() === "true";
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function todayDateString() {
      return new Date().toISOString().split("T")[0];
    }

    function getCreatedAt(task) {
      return task.date_created || task.created_at || task.created || task.timestamp || "";
    }

    function formatDurationFromMs(ms) {
      if (!ms || ms < 0) return "0 minutes";
      const totalMinutes = Math.floor(ms / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;
      const parts = [];
      if (days) parts.push(days + " day" + (days === 1 ? "" : "s"));
      if (hours) parts.push(hours + " hour" + (hours === 1 ? "" : "s"));
      if (minutes || parts.length === 0) parts.push(minutes + " minute" + (minutes === 1 ? "" : "s"));
      return parts.join(", ");
    }

    function getCompletionDurationText(task) {
      if (task.completion_duration) return task.completion_duration;
      const createdAt = getCreatedAt(task);
      const completedAt = task.completed_at || "";
      if (!createdAt || !completedAt) return "";
      const start = new Date(createdAt);
      const end = new Date(completedAt);
      if (isNaN(start.getTime()) || isNaN(end.getTime())) return "";
      return formatDurationFromMs(end - start);
    }

    function openCreateModal() {
      document.getElementById("modalModeLabel").innerText = "New Task";
      document.getElementById("taskId").value = "";
      document.getElementById("taskTitle").value = "";
      document.getElementById("taskDesc").value = "";
      document.getElementById("taskStatus").value = "initiation";
      document.getElementById("taskCreator").value = "";
      document.getElementById("taskDue").value = "";
      document.getElementById("timeTrack").innerText = "Active";
      document.getElementById("completionDurationLabel").innerText = "";
      document.getElementById("completedTitleLabel").innerText = "";
      document.getElementById("completedTitleLabel").classList.remove("strike-title");
      document.getElementById("taskModal").classList.remove("hidden");
    }

    function openEditModal(taskId) {
      const task = currentTasks.find(t => String(t.task_id) === String(taskId));
      if (!task) return;
      const status = isTruthy(task.archived) ? "archived" : (task.status || "initiation").toLowerCase().trim();
      const completed = isTruthy(task.completed) || status === "completed";
      const durationText = getCompletionDurationText(task);

      document.getElementById("modalModeLabel").innerText = "Edit Task";
      document.getElementById("taskId").value = task.task_id || "";
      document.getElementById("taskTitle").value = task.title || "";
      document.getElementById("taskDesc").value = task.description || "";
      document.getElementById("taskStatus").value = status;
      document.getElementById("taskCreator").value = task.creator || "";
      document.getElementById("taskDue").value = task.due_date || "";
      document.getElementById("timeTrack").innerText = completed ? "Complete" : status === "archived" ? "Archived" : "Active";
      document.getElementById("completionDurationLabel").innerText = durationText ? "Completed in " + durationText : "";
      document.getElementById("completedTitleLabel").innerText = task.title || "";
      document.getElementById("completedTitleLabel").classList.toggle("strike-title", completed);
      document.getElementById("taskModal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("taskModal").classList.add("hidden");
    }

    function toggleColumnMenu(phaseId) {
      const menu = document.getElementById("menu-" + phaseId);
      const isVisible = menu.style.display === "block";
      document.querySelectorAll(".column-menu").forEach(m => m.style.display = "none");
      menu.style.display = isVisible ? "none" : "block";
    }

    function toggleCardCollapse(event, taskId) {
      event.stopPropagation();
      collapsedCards[taskId] = !collapsedCards[taskId];
      localStorage.setItem("tektonCollapsedCards", JSON.stringify(collapsedCards));
      renderTasks(currentTasks);
    }

    function renderBoardShell() {
      const container = document.getElementById("boardContainer");
      container.innerHTML = "";
      phases.forEach(p => {
        container.innerHTML += `
          <div class="kanban-column">
            <div class="col-header" style="border-color: ${p.color}; color: #1e293b;">
              <span>${p.name}</span>
              <button id="dots-${p.id}" onclick="toggleColumnMenu('${p.id}')" class="text-slate-300 font-bold hover:text-slate-600 transition text-2xl">•••</button>
              <div id="menu-${p.id}" class="column-menu">
                <button onclick="sortColumnByDueDate('${p.id}')">Sort by Due Date</button>
                <button onclick="refreshBoard()">Refresh Column</button>
              </div>
            </div>
            <div id="${p.id}" class="task-column space-y-4" ondragover="allowDrop(event)" ondragleave="handleDragLeave(event)" ondrop="dropTask(event, '${p.id}')">
              <div class="placeholder">Phase Empty</div>
            </div>
          </div>
        `;
      });
    }

    function cleanupEmptyColumns() {
      document.querySelectorAll(".task-column").forEach(column => {
        const cards = column.querySelectorAll(".task-card");
        const placeholder = column.querySelector(".placeholder");
        if (cards.length === 0 && !placeholder) {
          column.innerHTML = '<div class="placeholder">Phase Empty</div>';
        }
      });
    }

    function renderDescription(task) {
      const desc = task.description || "";
      const lines = desc.split("
");

      return lines.map((line, index) => {
        const checked = line.trim().startsWith("- [x]");
        const unchecked = line.trim().startsWith("- [ ]");

        if (checked || unchecked) {
          const text = line.replace("- [x]", "").replace("- [ ]", "").trim();
          return `
            <label class="flex gap-2 items-start text-sm text-slate-500 font-medium mt-2 cursor-pointer">
              <input type="checkbox" ${checked ? "checked" : ""} onclick="event.stopPropagation(); toggleChecklistLine('${task.task_id}', ${index})" class="sheet-checkbox">
              <span class="desc-line ${checked ? "line-through opacity-60" : ""}">${escapeHtml(text)}</span>
            </label>
          `;
        }

        return `<p class="desc-line text-sm text-slate-500 font-medium leading-relaxed mt-2">${escapeHtml(line)}</p>`;
      }).join("");
    }

    function renderTasks(tasks) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      document.querySelectorAll(".task-column").forEach(column => {
        column.innerHTML = '<div class="placeholder">Phase Empty</div>';
      });

      const seen = new Set();

      tasks.forEach(task => {
        const taskId = String(task.task_id || "").trim();
        if (!taskId || seen.has(taskId)) return;
        seen.add(taskId);

        const status = isTruthy(task.archived) ? "archived" : (task.status || "initiation").toLowerCase().trim();
        const column = document.getElementById(status);
        if (!column) return;

        const placeholder = column.querySelector(".placeholder");
        if (placeholder) placeholder.remove();

        const dueDate = task.due_date ? new Date(task.due_date + "T00:00:00") : null;
        const completed = isTruthy(task.completed) || status === "completed" || status === "archived";

        let dueState = "";
        if (dueDate && !isNaN(dueDate.getTime()) && !completed) {
          if (dueDate < today) dueState = "overdue";
          else if (dueDate.getTime() === today.getTime()) dueState = "upcoming";
        }

        const card = document.createElement("div");
        card.className = "task-card" +
          (dueState === "overdue" ? " overdue-card" : "") +
          (completed ? " completed-card" : "") +
          (collapsedCards[taskId] ? " collapsed-card" : "");
        card.draggable = true;
        card.dataset.taskId = taskId;
        card.ondragstart = function(e) { dragTask(e, taskId); };
        card.ondragend = function() { endDrag(); };
        card.onclick = function(e) {
          if (!e.target.closest(".card-handle") && !e.target.closest(".collapse-toggle")) {
            openEditModal(taskId);
          }
        };

        const creator = task.creator || "";
        const creatorInitial = creator ? creator.charAt(0).toUpperCase() : "?";
        const durationText = getCompletionDurationText(task);

        card.innerHTML = `
          ${dueState === "overdue" ? '<span class="overdue-badge">OVERDUE</span>' : ''}
          ${dueState === "upcoming" ? '<span class="upcoming-badge">UPCOMING</span>' : ''}

          <div class="flex items-start justify-between gap-3">
            <h3 class="font-black text-slate-800 uppercase tracking-tight leading-tight text-base">${escapeHtml(task.title || "")}</h3>
            <div class="flex items-center gap-2">
              <button class="collapse-toggle" onclick="toggleCardCollapse(event, '${taskId}')">${collapsedCards[taskId] ? "+" : "−"}</button>
              <span class="card-handle text-slate-300 text-lg select-none">⋮⋮</span>
            </div>
          </div>

          <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-100">
            <div class="flex items-center gap-2">
              <div class="avatar">${escapeHtml(creatorInitial)}</div>
              <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${escapeHtml(creator)}</span>
            </div>
          </div>

          <div class="collapsible-detail">
            <div class="mt-2">${renderDescription(task)}</div>
            <div class="flex flex-wrap gap-2 mt-4">
              ${task.due_date ? `<span class="meta-pill">Due ${escapeHtml(task.due_date)}</span>` : ""}
              <span class="meta-pill">${escapeHtml(status)}</span>
              ${durationText && status === "completed" ? `<span class="meta-pill">Completed in ${escapeHtml(durationText)}</span>` : ""}
            </div>
          </div>
        `;

        column.appendChild(card);
      });

      cleanupEmptyColumns();
    }

    async function fetchFromGoogle() {
      setSyncStatus("Syncing", "bg-yellow-500 animate-pulse");
      renderBoardShell();

      try {
        const response = await fetch(scriptURL);
        if (!response.ok) throw new Error("HTTP " + response.status);
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        currentTasks = Array.isArray(data) ? data : [];
        renderTasks(currentTasks);
        setSyncStatus("Live Sync", "bg-green-500 animate-pulse");
      } catch (error) {
        console.error("Load error:", error);
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not load tasks.");
      }
    }

    async function saveTask() {
      const taskId = document.getElementById("taskId").value.trim();
      const title = document.getElementById("taskTitle").value.trim();
      const description = document.getElementById("taskDesc").value.trim();
      const status = document.getElementById("taskStatus").value;
      const creator = document.getElementById("taskCreator").value.trim();
      const dueDate = document.getElementById("taskDue").value;
      const btn = document.getElementById("submitBtn");

      if (!title) return alert("Title required.");
      if (!creator) return alert("Creator name required.");

      btn.disabled = true;
      btn.innerText = "Saving...";
      setSyncStatus("Saving", "bg-yellow-500 animate-pulse");

      try {
        const formData = new URLSearchParams();

        if (taskId) {
          const existingTask = currentTasks.find(t => String(t.task_id) === String(taskId));
          const wasCompleted = existingTask && (isTruthy(existingTask.completed) || String(existingTask.status).toLowerCase().trim() === "completed");
          const nowCompleted = status === "completed";
          const createdAt = existingTask ? getCreatedAt(existingTask) : "";

          formData.append("action", "update");
          formData.append("task_id", taskId);

          if (!wasCompleted && nowCompleted) {
            const completedAt = nowIso();
            formData.append("completed", "true");
            formData.append("completed_at", completedAt);
            if (createdAt) formData.append("completion_duration", formatDurationFromMs(new Date(completedAt) - new Date(createdAt)));
          }

          if (wasCompleted && !nowCompleted) {
            formData.append("completed", "false");
            formData.append("completed_at", "");
            formData.append("completion_duration", "");
          }
        } else {
          formData.append("action", "create");
          formData.append("date_created", nowIso());
          formData.append("completed", status === "completed" ? "true" : "false");
          if (status === "completed") {
            formData.append("completed_at", nowIso());
            formData.append("completion_duration", "0 minutes");
          }
        }

        formData.append("title", title);
        formData.append("description", description);
        formData.append("status", status);
        formData.append("creator", creator);
        formData.append("due_date", dueDate);
        formData.append("archived", status === "archived" ? "true" : "false");
        if (status === "archived") formData.append("archived_at", todayDateString());

        const response = await fetch(scriptURL, { method: "POST", body: formData });
        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Save failed");

        closeModal();
        await fetchFromGoogle();
      } catch (error) {
        console.error("Save error:", error);
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not save task.");
      } finally {
        btn.disabled = false;
        btn.innerText = "Save Task";
      }
    }

    async function toggleCompleted() {
      const taskId = document.getElementById("taskId").value.trim();
      if (!taskId) {
        document.getElementById("taskStatus").value = "completed";
        document.getElementById("completedTitleLabel").innerText = document.getElementById("taskTitle").value.trim();
        document.getElementById("completedTitleLabel").classList.add("strike-title");
        document.getElementById("timeTrack").innerText = "Complete";
        return;
      }

      const task = currentTasks.find(t => String(t.task_id) === String(taskId));
      if (!task) return;

      const currentlyCompleted = isTruthy(task.completed) || (task.status || "").toLowerCase().trim() === "completed";
      const nextCompleted = !currentlyCompleted;
      const completedAt = nextCompleted ? nowIso() : "";
      const createdAt = getCreatedAt(task);
      const duration = nextCompleted && createdAt ? formatDurationFromMs(new Date(completedAt) - new Date(createdAt)) : "";

      try {
        const formData = new URLSearchParams();
        formData.append("action", "update");
        formData.append("task_id", taskId);
        formData.append("completed", String(nextCompleted));
        formData.append("status", nextCompleted ? "completed" : "monitoring");
        formData.append("completed_at", completedAt);
        formData.append("completion_duration", duration);
        formData.append("archived", "false");

        const response = await fetch(scriptURL, { method: "POST", body: formData });
        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Complete failed");

        document.getElementById("completedTitleLabel").innerText = document.getElementById("taskTitle").value.trim();
        document.getElementById("completedTitleLabel").classList.toggle("strike-title", nextCompleted);
        document.getElementById("taskStatus").value = nextCompleted ? "completed" : "monitoring";
        document.getElementById("timeTrack").innerText = nextCompleted ? "Complete" : "Active";
        document.getElementById("completionDurationLabel").innerText = duration ? "Completed in " + duration : "";

        await fetchFromGoogle();
      } catch (error) {
        console.error("Complete error:", error);
        alert("Could not update completion.");
      }
    }

    async function archiveTask() {
      const taskId = document.getElementById("taskId").value.trim();
      if (!taskId) return alert("Save the task first, then archive it.");

      try {
        setSyncStatus("Archiving", "bg-yellow-500 animate-pulse");
        const formData = new URLSearchParams();
        formData.append("action", "update");
        formData.append("task_id", taskId);
        formData.append("archived", "true");
        formData.append("status", "archived");
        formData.append("archived_at", todayDateString());

        const response = await fetch(scriptURL, { method: "POST", body: formData });
        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Archive failed");

        closeModal();
        await fetchFromGoogle();
      } catch (error) {
        console.error("Archive error:", error);
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not archive task.");
      }
    }

    function dragTask(event, taskId) {
      draggedTaskId = taskId;
      event.dataTransfer.setData("text/plain", taskId);
      event.dataTransfer.effectAllowed = "move";
      event.currentTarget.classList.add("dragging");
    }

    function endDrag() {
      document.querySelectorAll(".task-card").forEach(card => card.classList.remove("dragging"));
      document.querySelectorAll(".task-column").forEach(col => col.classList.remove("drag-over"));
    }

    function allowDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(event) {
      if (event.currentTarget.contains(event.relatedTarget)) return;
      event.currentTarget.classList.remove("drag-over");
    }

    async function dropTask(event, newStatus) {
      event.preventDefault();
      event.stopPropagation();
      const column = event.currentTarget;
      column.classList.remove("drag-over");
      if (isMovingTask) return;

      const taskId = event.dataTransfer.getData("text/plain") || draggedTaskId;
      if (!taskId) return;
      const task = currentTasks.find(t => String(t.task_id) === String(taskId));
      if (!task) return endDrag();

      const oldStatus = isTruthy(task.archived) ? "archived" : (task.status || "").toLowerCase().trim();
      if (oldStatus === newStatus) return endDrag();

      isMovingTask = true;
      setSyncStatus("Moving", "bg-yellow-500 animate-pulse");

      try {
        const wasCompleted = oldStatus === "completed" || isTruthy(task.completed);
        const nowCompleted = newStatus === "completed";
        const completedAt = nowCompleted && !wasCompleted ? nowIso() : (nowCompleted ? task.completed_at || nowIso() : "");
        const createdAt = getCreatedAt(task);
        const duration = nowCompleted && completedAt && createdAt ? formatDurationFromMs(new Date(completedAt) - new Date(createdAt)) : "";

        const formData = new URLSearchParams();
        formData.append("action", "update");
        formData.append("task_id", taskId);
        formData.append("status", newStatus);
        formData.append("archived", String(newStatus === "archived"));
        formData.append("completed", String(nowCompleted));
        formData.append("completed_at", completedAt);
        formData.append("completion_duration", duration);
        if (newStatus === "archived") formData.append("archived_at", todayDateString());

        const response = await fetch(scriptURL, { method: "POST", body: formData });
        const result = await response.json();
        if (!result.success) throw new Error(result.error || "Move failed");

        setSyncStatus("Live Sync", "bg-green-500 animate-pulse");
        await fetchFromGoogle();
      } catch (error) {
        console.error("Move error:", error);
        await fetchFromGoogle();
        setSyncStatus("Offline", "bg-red-500");
        alert("Could not move task.");
      } finally {
        isMovingTask = false;
        draggedTaskId = null;
        endDrag();
      }
    }

    function sortColumnByDueDate(columnId) {
      const sorted = [...currentTasks].sort((a, b) => {
        const aStatus = isTruthy(a.archived) ? "archived" : (a.status || "").toLowerCase().trim();
        const bStatus = isTruthy(b.archived) ? "archived" : (b.status || "").toLowerCase().trim();
        const aMatch = aStatus === columnId;
        const bMatch = bStatus === columnId;
        if (!aMatch && !bMatch) return 0;
        if (aMatch && !bMatch) return -1;
        if (!aMatch && bMatch) return 1;
        const aDate = a.due_date ? new Date(a.due_date).getTime() : Number.MAX_SAFE_INTEGER;
        const bDate = b.due_date ? new Date(b.due_date).getTime() : Number.MAX_SAFE_INTEGER;
        return aDate - bDate;
      });
      renderBoardShell();
      renderTasks(sorted);
    }

    function refreshBoard() {
      fetchFromGoogle();
    }

    function convertDescriptionToChecklist() {
      const textarea = document.getElementById("taskDesc");
      const lines = textarea.value.split("
");
      textarea.value = lines.map(line => {
        const clean = line.trim();
        if (!clean) return "";
        if (clean.startsWith("- [ ]") || clean.startsWith("- [x]")) return line;
        return "- [ ] " + clean;
      }).join("
");
    }

    async function toggleChecklistLine(taskId, lineIndex) {
      const task = currentTasks.find(t => String(t.task_id) === String(taskId));
      if (!task) return;
      const lines = (task.description || "").split("
");

      if (lines[lineIndex].trim().startsWith("- [x]")) {
        lines[lineIndex] = lines[lineIndex].replace("- [x]", "- [ ]");
      } else if (lines[lineIndex].trim().startsWith("- [ ]")) {
        lines[lineIndex] = lines[lineIndex].replace("- [ ]", "- [x]");
      }

      task.description = lines.join("
");
      const formData = new URLSearchParams();
      formData.append("action", "update");
      formData.append("task_id", taskId);
      formData.append("description", task.description);

      await fetch(scriptURL, { method: "POST", body: formData });
      renderTasks(currentTasks);
    }

    window.onclick = function(event) {
      const modal = document.getElementById("taskModal");
      if (event.target === modal) closeModal();
      if (!event.target.closest(".kanban-column")) {
        document.querySelectorAll(".column-menu").forEach(menu => {
          menu.style.display = "none";
        });
      }
    };

    window.onload = fetchFromGoogle;
  </script>
</body>
