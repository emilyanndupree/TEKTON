<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKTON | Artisan Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F4F7F9; overflow: hidden; }
        
        .meister-scroller { 
            overflow-x: auto; 
            display: flex; 
            height: calc(100vh - 110px); 
            padding: 3rem; 
            gap: 4rem; 
        }
        .meister-scroller::-webkit-scrollbar { height: 16px; }
        .meister-scroller::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 20px; border: 4px solid #F4F7F9; }
        .meister-scroller::-webkit-scrollbar-track { background: #E2E8F0; border-radius: 20px; }

        .kanban-column { min-width: 450px; width: 450px; display: flex; flex-direction: column; position: relative; }
        .col-header { font-size: 3rem; font-weight: 900; letter-spacing: -0.06em; text-transform: uppercase; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 12px solid; }

        .task-card { background: white; border-radius: 35px; padding: 2.5rem; border: 1px solid #E2E8F0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .task-card:hover { transform: translateY(-10px); box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.1); border-color: #6366F1; }
        
        /* Column Menu Styling */
        .column-menu { position: absolute; right: 0; top: 70px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #E2E8F0; width: 180px; z-index: 60; display: none; }
        .column-menu button { width: 100%; text-align: left; padding: 12px 20px; font-size: 14px; font-weight: 700; color: #475569; }
        .column-menu button:hover { background: #F8FAFC; color: #6366F1; }

        .empty-msg { border: 5px dashed #E2E8F0; border-radius: 40px; padding: 7rem 2rem; text-align: center; color: #94A3B8; font-weight: 900; font-size: 1.3rem; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white border-b px-14 py-10 flex justify-between items-center shrink-0 z-50">
        <div class="flex items-center gap-8">
            <div class="bg-indigo-600 p-5 rounded-[25px] text-white text-4xl shadow-2xl">⚒️</div>
            <div>
                <span class="text-[11px] font-black tracking-[0.7em] text-indigo-500 uppercase">Tektōn Master</span>
                <h1 class="text-5xl font-black text-slate-900 tracking-tighter">PROJECT ROADMAP</h1>
            </div>
        </div>
        <button onclick="openModal()" class="bg-indigo-600 text-white px-14 py-6 rounded-full font-black uppercase tracking-widest shadow-2xl hover:bg-indigo-700 transition transform active:scale-95">
            + Forge Task
        </button>
    </header>

    <main class="meister-scroller" id="boardContainer"></main>

    <div id="taskModal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-3xl z-[100] flex items-center justify-center p-10">
        <div class="bg-white rounded-[60px] shadow-2xl w-full max-w-[1400px] max-h-[94vh] overflow-hidden flex flex-col">
            <div class="px-16 py-10 border-b flex justify-between items-center">
                <button onclick="markAsDone()" class="px-12 py-4 bg-indigo-50 border-3 border-indigo-600 text-indigo-600 rounded-[20px] font-black text-sm uppercase tracking-widest">✓ Mark Completed</button>
                <button onclick="closeModal()" class="text-8xl font-light text-slate-200 hover:text-slate-500 transition">&times;</button>
            </div>

            <div class="flex flex-1 overflow-hidden">
                <div class="flex-1 p-28 overflow-y-auto border-r border-slate-50 space-y-20">
                    <input id="taskTitle" type="text" placeholder="Headline..." class="w-full text-8xl font-black outline-none tracking-tighter">
                    <textarea id="taskDesc" placeholder="Artisan details..." class="w-full h-[300px] bg-slate-50/50 p-16 rounded-[60px] outline-none text-4xl"></textarea>
                </div>

                <div class="w-[550px] bg-slate-50/50 p-24 space-y-16 overflow-y-auto">
                    <div>
                        <label class="text-sm font-black text-slate-400 uppercase tracking-widest block mb-6">📅 Due Date</label>
                        <input id="taskDue" type="date" class="w-full p-8 bg-white border-4 border-slate-50 rounded-[35px] font-black text-2xl">
                    </div>
                    
                    <div>
                        <label class="text-sm font-black text-slate-400 uppercase tracking-widest block mb-6">🔄 Dependencies</label>
                        <select class="w-full p-8 bg-white border-4 border-slate-50 rounded-[35px] font-black text-slate-500 text-xl outline-none">
                            <option>🔓 Standalone (No dependencies)</option>
                            <option>🚧 Waiting on Materials</option>
                            <option>🪵 Priority Bottleneck</option>
                            <option>📎 Part of larger Build</option>
                        </select>
                    </div>

                    <div id="trackerBox" class="bg-indigo-600 rounded-[55px] p-16 shadow-3xl text-white transition-all duration-500">
                        <p class="text-xs font-black uppercase tracking-[0.3em] opacity-60 mb-4">Total Time Tracking</p>
                        <h4 id="timeTrack" class="text-6xl font-black tracking-tighter">00:00:00</h4>
                    </div>
                </div>
            </div>

            <div class="px-24 py-12 border-t bg-white flex justify-end gap-12">
                <button onclick="submitTask()" id="submitBtn" class="bg-indigo-600 text-white px-28 py-8 rounded-full font-black uppercase tracking-widest">Forge Task</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxAy5A55LmmRqrwI-zCXQr-hCfPCsvg4G4nPR8vNGMWPnFJQpiyS9LCFmpycK7AXZ0Waw/exec';

        const phases = [
            { id: 'initiation', name: '💡 Initiation', color: '#17d1c1' },
            { id: 'planning', name: '⚙️ Planning', color: '#00a2ed' },
            { id: 'resources', name: '⏳ Resources', color: '#4a69ff' },
            { id: 'execution', name: '🔄 Execution', color: '#a882ff' },
            { id: 'monitoring', name: '👓 Monitoring', color: '#f0506e' },
            { id: 'closing', name: '👍 Closing', color: '#92d000' }
        ];

        function openModal() { document.getElementById('taskModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }

        // --- NEW: THREE DOT MENU LOGIC ---
        function toggleColumnMenu(phaseId) {
            const menu = document.getElementById(`menu-${phaseId}`);
            const allMenus = document.querySelectorAll('.column-menu');
            allMenus.forEach(m => { if(m !== menu) m.style.display = 'none'; });
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        // --- NEW: TIME TRACKING FINISH ---
        function markAsDone() {
            const tracker = document.getElementById('trackerBox');
            const timer = document.getElementById('timeTrack');
            tracker.classList.replace('bg-indigo-600', 'bg-emerald-600');
            timer.innerText = "FORGED";
            alert("Build phase complete. Moving to archive.");
        }

        async function fetchFromGoogle() {
            const container = document.getElementById('boardContainer');
            container.innerHTML = '';
            phases.forEach(phase => {
                const col = document.createElement('div');
                col.className = 'kanban-column';
                col.innerHTML = `
                    <div class="col-header" style="border-color: ${phase.color}; color: #1e293b;">
                        <div class="flex justify-between items-center">
                            <span>${phase.name}</span>
                            <button onclick="toggleColumnMenu('${phase.id}')" class="text-slate-200 text-7xl font-light hover:text-slate-500 transition">•••</button>
                        </div>
                        <div id="menu-${phase.id}" class="column-menu">
                            <button onclick="alert('Sorting Column...')">Sort by Date</button>
                            <button onclick="alert('Cleaning Board...')">Clear Column</button>
                            <button onclick="toggleColumnMenu('${phase.id}')">Close</button>
                        </div>
                    </div>
                    <div id="${phase.id}" class="space-y-16 flex-1 overflow-y-auto no-scrollbar">
                        <div class="empty-msg">No Artisans here...</div>
                    </div>
                `;
                container.appendChild(col);
            });

            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                data.forEach(task => {
                    const status = (task.status || 'initiation').toLowerCase().trim();
                    const column = document.getElementById(status);
                    if (!column) return;
                    const empty = column.querySelector('.empty-msg');
                    if(empty) empty.remove();

                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.innerHTML = `
                        <h3 class="font-black text-slate-900 text-5xl mb-6 leading-none uppercase tracking-tight">${task.title}</h3>
                        <p class="text-2xl text-slate-400 font-bold line-clamp-2 mb-12">${task.description || ''}</p>
                        <div class="flex justify-between items-center pt-10 border-t-4 border-slate-50">
                            <span class="text-sm font-black text-slate-300 uppercase tracking-widest">👤 Tektōn</span>
                            <span class="text-sm font-black text-slate-300 uppercase">${task.due_date ? '📅 ' + task.due_date : ''}</span>
                        </div>
                    `;
                    column.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        async function submitTask() {
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const due = document.getElementById('taskDue').value;
            if(!title) return alert("Architecture requires a title!");

            try {
                await fetch(`${scriptURL}?title=${encodeURIComponent(title)}&description=${encodeURIComponent(desc)}&due_date=${due}&status=initiation`, {
                    method: 'POST', mode: 'no-cors'
                });
                closeModal();
                setTimeout(fetchFromGoogle, 2000);
            } catch (e) { console.error(e); }
        }
        window.onload = fetchFromGoogle;
    </script>
</body>
</html>
